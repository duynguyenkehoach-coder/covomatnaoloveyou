		<style>
			/* === 1. TẠO LƯỚI NỀN NEON KỸ THUẬT SỐ === */
			body::before {
				content: "";
				position: absolute;
				inset: 0;
				/* Tạo lưới neon */
				background-image:
					linear-gradient(to right, rgba(0, 255, 255, 0.1) 1px, transparent 1px),
					linear-gradient(to bottom, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
				background-size: 50px 50px;
				pointer-events: none;
				z-index: -2; /* Phía sau mọi thứ */
				box-shadow: 0 0 20px rgba(0, 255, 255, 0.5) inset; /* Phát sáng nền */
			}

			/* Thêm các điểm phát sáng tại giao lộ (giống hình 1) */
			body::after {
				content: '';
				position: absolute;
				width: 100%;
				height: 100%;
				background-image: radial-gradient(white 1.5px, transparent 1.5px);
				background-size: 50px 50px;
				background-position: center;
				opacity: 0.2;
				z-index: -2;
				pointer-events: none;
			}

			/* === 2. ĐỊNH NGHĨA VÀ TẠO HIỆU ỨNG CHO TRÁI TIM GRID NEON BAY === */
			.heart-grid-layer {
				position: absolute;
				inset: 0;
				z-index: -1; /* Trước lưới, sau wishes layer */
				pointer-events: none;
				overflow: hidden;
			}

			.heart-grid {
				position: absolute;
				width: 100px;
				height: 100px;
				animation: floatUpGrid 20s linear infinite; /* Bay lên chậm */
				opacity: 0;
			}

			/* SVG Trái tim kỹ thuật số grid (kiểu lưới neon) */
			.heart-grid svg {
				width: 100%;
				height: 100%;
			}

			/* Path Trái tim kỹ thuật số - Tạo viền và lưới */
			.heart-grid svg path {
				fill: none;
				stroke: #ff9ad9; /* Màu neon hồng */
				stroke-width: 1.5px;
				filter: drop-shadow(0 0 5px #ff00ff) drop-shadow(0 0 10px #ff00ff);
				animation: neonGlowPath 3s ease-in-out infinite alternate; /* Phát sáng nhấp nháy */
			}

			/* CSS Animations cho trái tim bay */
			@keyframes floatUpGrid {
				0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
				10% { opacity: 1; }
				90% { opacity: 1; }
				100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
			}

			@keyframes neonGlowPath {
				0% { stroke-opacity: 0.7; filter: drop-shadow(0 0 5px #ff00ff); }
				100% { stroke-opacity: 1; filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #ff00ff); }
			}

			/* Responsive cho mobile */
			@media (max-width: 768px) {
				.heart-grid {
					width: 60px;
					height: 60px;
				}
			}

			/* === 3. CẬP NHẬT HIỆU ỨNG Wishes text (Lời chúc bay) === */
			.wishes-layer {
				position: absolute;
				inset: 0;
				z-index: 10;
				pointer-events: none;
				transform-origin: center center;
				transform-style: preserve-3d;
				will-change: transform;
			}

			.wish-text {
				display: inline-block;
				font-size: 1.3rem; /* Tăng size */
				padding: 0.5rem 1.2rem;
				border-radius: 999px;
				color: #ff9ad9;
				/* Phát sáng neon mạnh mẽ hơn */
				text-shadow:
					0 0 8px rgba(255, 105, 180, 1),
					0 0 25px rgba(255, 20, 147, 0.9),
					0 0 40px rgba(255, 20, 147, 0.7);
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid rgba(255, 192, 203, 0.8);
				box-shadow:
					0 0 18px rgba(255, 105, 180, 0.8),
					0 0 35px rgba(255, 20, 147, 0.5);
				white-space: nowrap;
				transform-origin: center center;
				pointer-events: auto;
			}

			/* Animation bay chậm đều từ dưới lên trên */
			@keyframes wishFloatUp {
				0% { opacity: 0; transform: translateX(-50%) translateY(10vh); }
				15% { opacity: 1; }
				100% { opacity: 0; transform: translateX(-50%) translateY(-110vh); }
			}

			.wish-animate {
				animation: wishFloatUp 8s linear forwards;
			}

			/* === 4. ẨN PHÁO HOA VÀ CÁC NÚT KHÔNG CẦN THIẾT === */
			/* Ẩn Canvas pháo hoa */
			.canvas-container {
				opacity: 0 !important;
				pointer-events: none !important;
			}

			/* Ẩn nút pause và nút cài đặt */
			.pause-btn,
			.settings-btn {
				display: none !important;
			}
		</style>
